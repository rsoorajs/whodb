query GetGCPProviders {
  GCPProviders {
    Id
    ProviderType
    Name
    Region
    Status
    LastDiscoveryAt
    DiscoveredCount
    Error
    ProjectID
    ServiceAccountKeyPath
    DiscoverCloudSQL
    DiscoverAlloyDB
    DiscoverMemorystore
  }
}

query GetGCPProvider($id: ID!) {
  GCPProvider(id: $id) {
    Id
    ProviderType
    Name
    Region
    Status
    LastDiscoveryAt
    DiscoveredCount
    Error
    ProjectID
    ServiceAccountKeyPath
    DiscoverCloudSQL
    DiscoverAlloyDB
    DiscoverMemorystore
  }
}

query GetLocalGCPProjects {
  LocalGCPProjects {
    ProjectID
    Name
    Source
    IsDefault
  }
}

query GetGCPRegions {
  GCPRegions {
    Id
    Description
  }
}

mutation AddGCPProvider($input: GCPProviderInput!) {
  AddGCPProvider(input: $input) {
    Id
    ProviderType
    Name
    Region
    Status
    LastDiscoveryAt
    DiscoveredCount
    Error
    ProjectID
    ServiceAccountKeyPath
    DiscoverCloudSQL
    DiscoverAlloyDB
    DiscoverMemorystore
  }
}

mutation UpdateGCPProvider($id: ID!, $input: GCPProviderInput!) {
  UpdateGCPProvider(id: $id, input: $input) {
    Id
    ProviderType
    Name
    Region
    Status
    LastDiscoveryAt
    DiscoveredCount
    Error
    ProjectID
    ServiceAccountKeyPath
    DiscoverCloudSQL
    DiscoverAlloyDB
    DiscoverMemorystore
  }
}

mutation TestGCPCredentials($input: GCPProviderInput!) {
  TestGCPCredentials(input: $input)
}

mutation RefreshGCPProvider($id: ID!) {
  RefreshGCPProvider(id: $id) {
    Id
    ProviderType
    Name
    Region
    Status
    LastDiscoveryAt
    DiscoveredCount
    Error
    ProjectID
    ServiceAccountKeyPath
    DiscoverCloudSQL
    DiscoverAlloyDB
    DiscoverMemorystore
  }
}

mutation GenerateCloudSQLIAMAuthToken($providerID: ID!, $username: String!) {
  GenerateCloudSQLIAMAuthToken(providerID: $providerID, username: $username)
}
