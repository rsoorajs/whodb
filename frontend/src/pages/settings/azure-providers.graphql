query GetAzureProviders {
  AzureProviders {
    Id
    ProviderType
    Name
    Region
    SubscriptionID
    TenantID
    ResourceGroup
    DiscoverPostgreSQL
    DiscoverMySQL
    DiscoverRedis
    DiscoverCosmosDB
    Status
    DiscoveredCount
    LastDiscoveryAt
    Error
  }
}

query GetAzureProvider($id: ID!) {
  AzureProvider(id: $id) {
    Id
    ProviderType
    Name
    Region
    SubscriptionID
    TenantID
    ResourceGroup
    DiscoverPostgreSQL
    DiscoverMySQL
    DiscoverRedis
    DiscoverCosmosDB
    Status
    DiscoveredCount
    LastDiscoveryAt
    Error
  }
}

query GetAzureSubscriptions {
  AzureSubscriptions {
    Id
    DisplayName
    State
    TenantID
  }
}

query GetAzureRegions {
  AzureRegions {
    Id
    DisplayName
    Geography
  }
}

mutation AddAzureProvider($input: AzureProviderInput!) {
  AddAzureProvider(input: $input) {
    Id
    ProviderType
    Name
    Region
    SubscriptionID
    TenantID
    ResourceGroup
    DiscoverPostgreSQL
    DiscoverMySQL
    DiscoverRedis
    DiscoverCosmosDB
    Status
    DiscoveredCount
    LastDiscoveryAt
    Error
  }
}

mutation UpdateAzureProvider($id: ID!, $input: AzureProviderInput!) {
  UpdateAzureProvider(id: $id, input: $input) {
    Id
    ProviderType
    Name
    Region
    SubscriptionID
    TenantID
    ResourceGroup
    DiscoverPostgreSQL
    DiscoverMySQL
    DiscoverRedis
    DiscoverCosmosDB
    Status
    DiscoveredCount
    LastDiscoveryAt
    Error
  }
}

mutation TestAzureCredentials($input: AzureProviderInput!) {
  TestAzureCredentials(input: $input)
}

mutation GenerateAzureADToken($providerID: ID!, $sourceType: String!) {
  GenerateAzureADToken(providerID: $providerID, sourceType: $sourceType)
}

mutation RefreshAzureProvider($id: ID!) {
  RefreshAzureProvider(id: $id) {
    Id
    ProviderType
    Name
    Region
    SubscriptionID
    TenantID
    ResourceGroup
    DiscoverPostgreSQL
    DiscoverMySQL
    DiscoverRedis
    DiscoverCosmosDB
    Status
    DiscoveredCount
    LastDiscoveryAt
    Error
  }
}
