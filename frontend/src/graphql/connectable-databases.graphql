query GetConnectableDatabases {
  ConnectableDatabases {
    id
    label
    pluginType
    extra {
      Key
      Value
    }
    fields {
      hostname
      username
      password
      database
      searchPath
    }
    requiredFields {
      hostname
      username
      password
      database
    }
    supportsModifiers
    supportsScratchpad
    supportsSchema
    supportsDatabaseSwitching
    usesSchemaForGraph
    usesDatabaseInsteadOfSchema
    supportsMockData
    isAwsManaged
    sslModes {
      value
      aliases
    }
  }
}
