query AnalyzeMockDataDependencies($ref: SourceObjectRefInput!, $rowCount: Int!, $fkDensityRatio: Int) {
  AnalyzeMockDataDependencies(ref: $ref, rowCount: $rowCount, fkDensityRatio: $fkDensityRatio) {
    GenerationOrder
    Tables {
      Table
      RowsToGenerate
      IsBlocked
      UsesExistingData
    }
    TotalRows
    Warnings
    Error
  }
}
